<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cena 3D - Copos Longos</title>
    <style>
        :root {
            /* Cores Densas */
            --cor-azul: rgba(0, 50, 100, 0.95);
            --cor-azul-brilho: rgba(40, 120, 200, 0.9);
            --cor-laranja: rgba(130, 40, 0, 0.95);
            --cor-laranja-brilho: rgba(220, 100, 20, 0.9);
            
            --cor-fundo: #222222;
            --tempo: 5s;
        }

        body {
            background-color: var(--cor-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            gap: 100px; /* Espaço entre os copos */
            perspective: 1500px;
        }

        /* --- Container Ajustado (Mais alto e estreito) --- */
        .container-copo {
            position: relative;
            width: 160px; /* Diminuído para ficar menos "gordo" */
            height: 400px; /* Aumentado para ficar mais alto */
            transform-style: preserve-3d;
        }

        /* --- Vidro com Sombreamento Cilíndrico --- */
        .copo {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(255,255,255,0.08) 0%, 
                rgba(255,255,255,0.01) 15%, 
                rgba(255,255,255,0) 50%, 
                rgba(255,255,255,0.01) 85%, 
                rgba(255,255,255,0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-bottom-left-radius: 10px 20px;
            border-bottom-right-radius: 10px 20px;
            overflow: hidden;
            z-index: 2;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.7);
        }

        /* Reflexo vertical longo */
        .copo::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            width: 5px;
            height: 90%;
            background: rgba(255, 255, 255, 0.25);
            filter: blur(2px);
            z-index: 10;
        }

        /* Borda Superior (Boca do Copo) */
        .borda-topo {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            z-index: 5;
        }

        /* Base do Vidro (Grosso) */
        .base-vidro {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(0,0,0,0.5));
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 3;
        }

        /* --- Líquidos --- */
        .liquido {
            position: absolute;
            bottom: 40px;
            width: 100%;
            z-index: 2;
        }

        /* Superfície (Elipse) */
        .superficie {
            position: absolute;
            top: -10px;
            width: 100%;
            height: 20px;
            border-radius: 50%;
            z-index: 4;
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        .azul {
            background: linear-gradient(to top, var(--cor-azul), #000b1a);
            animation: gangorra-azul var(--tempo) infinite ease-in-out;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.4), inset -10px 0 20px rgba(0,0,0,0.4);
        }
        .azul .superficie {
            background: radial-gradient(circle, var(--cor-azul-brilho) 0%, var(--cor-azul) 80%);
        }

        .laranja {
            background: linear-gradient(to top, var(--cor-laranja), #1a0800);
            animation: gangorra-laranja var(--tempo) infinite ease-in-out;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.4), inset -10px 0 20px rgba(0,0,0,0.4);
        }
        .laranja .superficie {
            background: radial-gradient(circle, var(--cor-laranja-brilho) 0%, var(--cor-laranja) 80%);
        }

        /* --- Keyframes Gangorra --- */
        @keyframes gangorra-azul {
            0%, 100% { height: 15%; }
            50% { height: 85%; }
        }

        @keyframes gangorra-laranja {
            0%, 100% { height: 85%; }
            50% { height: 15%; }
        }

        /* Sombra de apoio */
        .sombra-chao {
            position: absolute;
            bottom: -30px;
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.8);
            filter: blur(15px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container-copo">
        <div class="borda-topo"></div>
        <div class="copo">
            <div class="liquido azul">
                <div class="superficie"></div>
            </div>
            <div class="base-vidro"></div>
        </div>
        <div class="sombra-chao"></div>
    </div>

    <div class="container-copo">
        <div class="borda-topo"></div>
        <div class="copo">
            <div class="liquido laranja">
                <div class="superficie"></div>
            </div>
            <div class="base-vidro"></div>
        </div>
        <div class="sombra-chao"></div>
    </div>

</body>
</html>
