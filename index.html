<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação 3D - Copos Retos com Reflexo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. CENA E FUNDO
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#111'); // Fundo um pouco mais escuro para destacar o brilho

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    // Configurações de iluminação para reflexos melhores
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // Gerar um mapa de ambiente simples para haver reflexo no vidro
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

    // 2. LUZES
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // Luz principal (gera o brilho forte no vidro)
    const pointLight = new THREE.PointLight(0xffffff, 50);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const sideLight = new THREE.SpotLight(0xffffff, 20);
    sideLight.position.set(-5, 2, 2);
    scene.add(sideLight);

    // 3. MATERIAIS
    const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0.1,
        roughness: 0.02,
        transmission: 0.95, // Transparência física
        thickness: 0.5,
        transparent: true,
        opacity: 0.5,
        clearcoat: 1.0, // Camada extra de brilho
        clearcoatRoughness: 0.05,
        ior: 1.5, // Índice de refração do vidro
    });

    const yellowMaterial = new THREE.MeshStandardMaterial({ color: '#E0BD1F', roughness: 0.1, metalness: 0.2 });
    const blueMaterial = new THREE.MeshStandardMaterial({ color: '#1FA4E0', roughness: 0.1, metalness: 0.2 });

    // 4. GEOMETRIAS (Ajustadas para serem retas: Raio superior = Raio inferior)
    const cupHeight = 3;
    const radius = 1; 
    const cupGeo = new THREE.CylinderGeometry(radius, radius, cupHeight, 64, 1, true);
    const bottomGeo = new THREE.CylinderGeometry(radius, radius, 0.1, 64);
    const liquidGeo = new THREE.CylinderGeometry(radius - 0.05, radius - 0.05, 1, 64); // Levemente menor para não atravessar o vidro

    function createCup(xPos, liquidMat) {
        const group = new THREE.Group();
        
        // Vidro lateral
        const glass = new THREE.Mesh(cupGeo, glassMaterial);
        
        // Fundo do vidro
        const bottom = new THREE.Mesh(bottomGeo, glassMaterial);
        bottom.position.y = -cupHeight / 2;
        
        // Líquido
        const liquid = new THREE.Mesh(liquidGeo, liquidMat);
        
        group.add(glass, bottom);
        group.position.x = xPos;
        
        scene.add(group);
        scene.add(liquid);
        liquid.position.x = xPos;
        
        return liquid;
    }

    const liquidLeft = createCup(-2, yellowMaterial);
    const liquidRight = createCup(2, blueMaterial);

    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    // 5. ANIMAÇÃO
    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.002;
        
        const minHeight = 0.1;
        const maxHeight = 2.7;
        const range = (maxHeight - minHeight) / 2;
        const center = (maxHeight + minHeight) / 2;

        const offset = Math.sin(time) * range;
        const h1 = center + offset;
        const h2 = center - offset;

        liquidLeft.scale.y = h1;
        liquidRight.scale.y = h2;

        // Ajuste da posição baseado no fundo do copo reto
        liquidLeft.position.y = -1.5 + (h1 / 2);
        liquidRight.position.y = -1.5 + (h2 / 2);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
