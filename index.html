<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação 3D - Líquidos Proporcionais</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. CENA E FUNDO
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#222');

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. LUZES (Focadas nos objetos)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(2, 5, 5);
    scene.add(directionalLight);

    // 3. MATERIAIS
    const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        transmission: 0.9,
        thickness: 0.2,
        roughness: 0.05,
        transparent: true,
        opacity: 0.4
    });

    const yellowMaterial = new THREE.MeshStandardMaterial({ color: '#E0BD1F', roughness: 0.2 });
    const blueMaterial = new THREE.MeshStandardMaterial({ color: '#1FA4E0', roughness: 0.2 });

    // 4. GEOMETRIAS
    const cupHeight = 3;
    const cupGeo = new THREE.CylinderGeometry(1, 0.8, cupHeight, 48, 1, true);
    const bottomGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.05, 48);
    const liquidGeo = new THREE.CylinderGeometry(0.95, 0.76, 1, 48); // Geometria base do líquido

    // Função para criar o conjunto copo + líquido
    function createCup(xPos, liquidMat) {
        const group = new THREE.Group();
        
        // Vidro lateral
        const glass = new THREE.Mesh(cupGeo, glassMaterial);
        // Fundo do vidro
        const bottom = new THREE.Mesh(bottomGeo, glassMaterial);
        bottom.position.y = -cupHeight / 2;
        
        // Líquido
        const liquid = new THREE.Mesh(liquidGeo, liquidMat);
        
        group.add(glass, bottom);
        group.position.x = xPos;
        
        scene.add(group);
        scene.add(liquid); // Líquido fora do grupo para facilitar escala global
        liquid.position.x = xPos;
        
        return liquid;
    }

    const liquidLeft = createCup(-2, yellowMaterial);
    const liquidRight = createCup(2, blueMaterial);

    camera.position.set(0, 1, 8);

    // 5. ANIMAÇÃO LOGÍCA
    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.002;
        
        // Definindo limites para o líquido não sair do copo
        // Min: 0.1 (quase vazio) | Max: 2.8 (quase cheio, copo tem 3.0)
        const minHeight = 0.1;
        const maxHeight = 2.8;
        const range = (maxHeight - minHeight) / 2;
        const center = (maxHeight + minHeight) / 2;

        // Oscilação inversa perfeita
        const offset = Math.sin(time) * range;
        const h1 = center + offset;
        const h2 = center - offset;

        // Aplicação da Escala (Y)
        liquidLeft.scale.y = h1;
        liquidRight.scale.y = h2;

        // Ajuste de Posição (Y) para o líquido crescer a partir da base
        // A base interna do copo está em -1.5
        liquidLeft.position.y = -1.5 + (h1 / 2);
        liquidRight.position.y = -1.5 + (h2 / 2);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
