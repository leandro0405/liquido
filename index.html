<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipiente 3D Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #333 0%, #111 100%); }
        canvas { display: block; }
        .info { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
    </style>
</head>
<body>
<div class="info">Arraste para girar | Scroll para Zoom</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. CONFIGURAÇÃO DA CENA
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true; // Ativa sombras
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. ILUMINAÇÃO (Estúdio)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const light = new THREE.PointLight(0xffffff, 100);
    light.position.set(5, 10, 5);
    light.castShadow = true;
    scene.add(light);

    // Reflexo de ambiente (Fake HDR)
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

    // 3. MATERIAIS
    const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0,
        roughness: 0.05,
        transmission: 1.0,
        ior: 1.5,
        thickness: 0.2,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });

    const liquidMat1 = new THREE.MeshStandardMaterial({ color: '#E0BD1F', roughness: 0.1, metalness: 0.3 });
    const liquidMat2 = new THREE.MeshStandardMaterial({ color: '#1FA4E0', roughness: 0.1, metalness: 0.3 });

    // 4. ELEMENTOS DA CENA
    
    // Chão reflexivo
    const planeGeo = new THREE.PlaneGeometry(20, 20);
    const planeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.2, metalness: 0.8 });
    const floor = new THREE.Mesh(planeGeo, planeMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Geometrias Retas
    const cupHeight = 4;
    const cupGeo = new THREE.CylinderGeometry(1, 1, cupHeight, 64, 1, true);
    const bottomGeo = new THREE.CylinderGeometry(1, 1, 0.1, 64);
    const liquidGeo = new THREE.CylinderGeometry(0.95, 0.95, 1, 64);

    function createContainer(xPos, material) {
        const group = new THREE.Group();
        
        const glass = new THREE.Mesh(cupGeo, glassMat);
        glass.castShadow = true;
        
        const bottom = new THREE.Mesh(bottomGeo, glassMat);
        bottom.position.y = -cupHeight/2;
        bottom.castShadow = true;

        const liquid = new THREE.Mesh(liquidGeo, material);
        liquid.position.x = xPos;
        
        group.add(glass, bottom);
        group.position.x = xPos;
        
        scene.add(group);
        scene.add(liquid);
        
        return liquid;
    }

    const liqLeft = createContainer(-2.5, liquidMat1);
    const liqRight = createContainer(2.5, liquidMat2);

    // 5. ANIMAÇÃO
    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        const time = Date.now() * 0.002;
        
        // Oscilação
        const h1 = 2 + Math.sin(time) * 1.5;
        const h2 = 2 - Math.sin(time) * 1.5;

        liqLeft.scale.y = h1;
        liqLeft.position.y = -1.95 + (h1 / 2);

        liqRight.scale.y = h2;
        liqRight.position.y = -1.95 + (h2 / 2);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
